# version: 1.0.0
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
continuation_prompt = "[‚Ėł‚ĖĻ ](dimmed white)"

format = """($nix_shell$container$fill$git_metrics\n)$cmd_duration\
$hostname\
$os\
$env_var\
$jobs\
$sudo\
$username\
$character"""

right_format = """
$all
"""

[fill]
symbol = '¬∑'
style = 'cyan'

[character]
format = "$symbol "
success_symbol = "[‚óé](bold italic bright-yellow)"
error_symbol = "[‚óč](italic purple)"
vimcmd_symbol = "[‚Ė†](italic dimmed green)"
# not supported in zsh
vimcmd_replace_one_symbol = "‚óĆ"
vimcmd_replace_symbol = "‚Ė°"
vimcmd_visual_symbol = "‚Ėľ"

[env_var.VIMSHELL]
format = "[$env_value]($style)"
style = 'green italic'

[sudo]
# this module make a log entry output for each command. PWD=$HOME; USER=root; COMMAND=/usr/bin/true
format = "[$symbol]($style)"
style = "bold italic bright-purple"
symbol = "‚čą‚Ēą"
disabled = true

[username]
style_user = "bright-yellow bold italic"
style_root = "purple bold italic"
format = "[‚≠ė $user]($style) "
disabled = false
show_always = false

[directory]
truncation_length = 6
truncation_symbol = 'ÔĀľ '
truncate_to_repo = false
home_symbol = 'Óėó ~' # nf-costum-home
style = 'fg:#7aa2f7 bg:#1a1b26'
read_only = ' ůįĆĺ ' # nf-md-lock
read_only_style = 'fg:#f7768e bg:#1a1b26'
format = '[$path]($style)[$read_only]($read_only_style)'

[cmd_duration]
format = "[‚óĄ $duration ](italic white)"

[jobs]
format = "[$symbol$number]($style) "
style = "white"
symbol = "[‚Ė∂](blue italic)"

[gcloud]
disabled = true

[git_branch]
symbol = 'ÔĄď ÔĄ¶ ' # nf-fa-github_alt, nf-fa-code_fork
truncation_length = 10
truncation_symbol = ''
style = 'fg:#7aa2f7 bg:#1a1b26'
format = '[ ÓāĪ $symbol$branch(:$remote_branch)]($style)' # nf-pl-left_soft_divider


[git_status]
# format = "[$untracked$staged$modified$renamed$conflicted$ahead_behind ]($style)"
format = '([\[$all_status$ahead_behind\] ]($style))'
style = 'fg:#e0af68 bg:#1a1b26'
# options available for format
staged     = "[+](green)"
modified   = "[!](yellow)"
renamed    = "[¬Ľ](blue)"
deleted    = "[-](red)"
untracked  = "[?](red)"
stashed    = "[‚Č°](lavender)"
conflicted = "[‚úĖ](red bold)"

ahead      = "[‚á°${count}](teal)"
behind     = "[‚á£${count}](peach)"
diverged   = "[‚áē‚á°${ahead_count}‚á£${behind_count}](mauve)"

[aws]
disabled = true
format = " [aws](italic) [$symbol $profile $region]($style)"
style = "bold blue"
symbol = "‚Ė≤ "

[nix_shell]
style = 'bold italic dimmed blue'
symbol = '‚ú∂'
format = '[$symbol nix‚é™$state‚é™]($style) [$name ](italic dimmed white)'
impure_msg = '[‚ĆĹ](bold dimmed red)'
pure_msg = '[‚Ćĺ](bold dimmed green)'
unknown_msg = '[‚óĆ](bold dimmed yellow)'

[os]
format = "$symbol"
# style = "fg:$1a1b26 bg:#7aa2f7"
disabled = false

[os.symbols]
Arch = "[ÔĆÉ ](bold blue)"
Fedora = "[ÔĆä ](bold blue)"
Kali = "[ÔĆß ](bold fg:#8e9292)"
AlmaLinux = "[ÔĆĚ ](bold fg:#f47920)"
NixOS = "[ÔĆď ](bold cyan)"
Ubuntu = "ÓĮČ "
Macos = "[ÔÖĻ ](bold white)"
Windows = "ÓúŹ "
